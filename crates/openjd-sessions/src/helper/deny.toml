# cargo-deny configuration for the cross-user helper binary.
# Stricter than the workspace config — no advisory ignores since the helper
# has a minimal dependency tree (serde, serde_json, nix/windows).

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "deny"
skip = [
    # serde_derive moved to syn 3 while the windows-* proc macros still
    # use syn 2. Proc-macro crates are compile-time only, so the
    # duplicate never ships in the helper binary. Remove once the
    # windows crates migrate to syn 3 and the tree converges.
    { name = "syn" },
]

[advisories]
version = 2
# No ignores — the helper's small dep tree should have zero advisories.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
